[builder]
pipeline = "ds003838_eeg_ppg_phase2"

[dataset]
dataset_id = "ds003838"
dataset_version = "1.0.6"
dataset_name = "ds003838-eeg-ppg-digit-span-rest"
base_url = "https://s3.amazonaws.com/openneuro.org/ds003838"

[subjects]
train = ["sub-032", "sub-034", "sub-036", "sub-038"]
eval = ["sub-033", "sub-035", "sub-039", "sub-040"]

[tasks]
include = ["memory"]

[fetch]
raw_modalities = ["eeg", "ecg"]
force = false
retry_attempts = 3
retry_backoff_seconds = 2.0

[window]
task = "memory"
anchor = "matched_event_onset"
exclude_trial_types = ["STATUS"]
max_events_per_subject = 512
eeg_event_tmin_seconds = 0.0
eeg_event_tmax_seconds = 0.5
eeg_channel_count = 63
eeg_clean_resample_hz = 256.0
ppg_channel_name = "PPG"
ppg_native_tmin_seconds = 0.0
ppg_native_tmax_seconds = 2.0
ppg_clean_resample_hz = 128.0

[cleaning.eeg]
notch_freq_hz = 60.0

[cleaning.ppg]
notch_freq_hz = 60.0
bandpass_low_hz = 0.5
bandpass_high_hz = 20.0

[quality]
max_alignment_rmse_seconds = 0.001
max_alignment_abs_seconds = 0.001
ppg_min_peak_count = 1
ppg_max_peak_count = 6
ppg_clean_min_std = 0.01
ppg_max_clip_fraction = 0.2
ppg_peak_min_distance_seconds = 0.3
ppg_peak_threshold_std = 0.1

[benchmark]
eeg_duration_seconds = 2.0
eeg_probe_frequencies_hz = [10.0, 20.0, 40.0, 60.0, 80.0]
eeg_transient_burst_frequency_hz = 40.0
eeg_transient_sigma_seconds = 0.03
ppg_duration_seconds = 4.0
ppg_probe_frequencies_hz = [1.0, 2.0, 5.0, 10.0, 20.0, 30.0, 60.0]
ppg_pulse_rise_seconds = 0.04
ppg_pulse_decay_seconds = 0.18
compute_repeats = 20

[expected]
subject_ids = ["sub-032", "sub-033", "sub-034", "sub-035", "sub-036", "sub-038", "sub-039", "sub-040"]
paired_window_count = 4096
eeg_event_window_shape = [63, 500]
eeg_clean_window_shape = [63, 128]
ppg_native_window_shape = [2000]
ppg_clean_window_shape = [256]
min_quality_pass_count = 3600
min_mean_ppg_peak_count = 1.0

[paths]
dataset_root = ".tmp/ds003838_phase2/source"
fetch_report = "reports/cross_modal/ds003838/ds003838_phase2_expanded_fetch_report.json"
dataset = "reports/cross_modal/ds003838/ds003838_phase2_expanded_windows.npz"
metadata = "reports/cross_modal/ds003838/ds003838_phase2_expanded_windows_metadata.json"
metrics = "reports/cross_modal/ds003838/ds003838_phase2_expanded_windows_metrics.json"
summary = "reports/cross_modal/ds003838/ds003838_phase2_expanded_windows_summary.md"
benchmark_metrics = "reports/cross_modal/ds003838/ds003838_phase2_expanded_filter_benchmark.json"
benchmark_report = "reports/cross_modal/ds003838/ds003838_phase2_expanded_filter_benchmark.md"
