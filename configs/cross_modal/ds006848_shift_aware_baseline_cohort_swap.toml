[baseline]
dataset = "reports/cross_modal/ds006848/ds006848_phase2_cohort_swap_windows.npz"
metadata = "reports/cross_modal/ds006848/ds006848_phase2_cohort_swap_windows_metadata.json"
targets = "reports/cross_modal/ds006848/ds006848_cohort_swap_target_arrays.npz"
reference_zero_shot_metrics = "reports/cross_modal/ds006848/ds006848_cohort_swap_morphology_baseline_metrics.json"
ridge_lambda = 1000.0
feature_branches = ["eeg_event_windows", "eeg_clean_windows"]
target_names = [
  "mean_ibi_seconds",
  "amplitude_range",
  "rising_edge_slope_max",
  "dominant_beat_amplitude",
  "dominant_beat_rise_time_seconds",
  "dominant_beat_width_seconds",
]
aggregate_target_names = [
  "amplitude_range",
  "rising_edge_slope_max",
  "dominant_beat_amplitude",
  "dominant_beat_rise_time_seconds",
  "dominant_beat_width_seconds",
]
min_train_windows_per_target = 950
min_eval_windows_per_target = 950

[calibration]
eval_windows_per_subject = 32
subject_std_floor = 1.0e-6

[expected]
train_windows = 1024
min_eval_test_windows = 800
branch_names = ["eeg_event_windows", "eeg_clean_windows"]
mode_names = ["oracle_subject_zscore", "calibrated_subject_zscore"]

[paths]
report = "reports/cross_modal/ds006848/ds006848_cohort_swap_shift_aware_baseline_report.md"
metrics = "reports/cross_modal/ds006848/ds006848_cohort_swap_shift_aware_baseline_metrics.json"
