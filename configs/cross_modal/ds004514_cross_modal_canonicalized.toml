[dataset]
dataset_id = "ds004514"
dataset_version = "1.1.2"
dataset_name = "ds004514-simultaneous-eeg-fnirs-semantic-decoding"
base_url = "https://s3.amazonaws.com/openneuro.org/ds004514"

[subjects]
train = ["sub-01", "sub-10"]
eval = ["sub-03", "sub-11"]

[policy]
subject_quality_policy = "configs/cross_modal/ds004514_subject_quality_policy.json"
allowed_tier = "default_train_eval"

[fetch]
include_code_examples = false
raw_modalities = ["eeg", "fnirs"]
force = false

[alignment]
max_rmse_seconds = 0.1
max_abs_seconds = 0.15

[window]
event_trial_types = ["animal_image", "tool_image"]
eeg_tmin_seconds = 0.0
eeg_tmax_seconds = 0.6
fnirs_tmin_seconds = 0.0
fnirs_tmax_seconds = 10.0
eeg_channel_count = 64
fnirs_target_samples = 78

[expected]
subject_ids = ["sub-01", "sub-03", "sub-10", "sub-11"]
paired_window_count = 720
eeg_window_shape = [64, 1229]
fnirs_window_shape = [12, 78]
canonical_channel_count = 12

[paths]
dataset_root = ".tmp/ds004514_cross_modal_canonicalized/source"
fetch_report = "reports/cross_modal/ds004514/ds004514_cross_modal_canonicalized_fetch_report.json"
dataset = "reports/cross_modal/ds004514/ds004514_cross_modal_canonicalized_windows.npz"
metadata = "reports/cross_modal/ds004514/ds004514_cross_modal_canonicalized_metadata.json"
metrics = "reports/cross_modal/ds004514/ds004514_cross_modal_canonicalized_metrics.json"
summary = "reports/cross_modal/ds004514/ds004514_cross_modal_canonicalized_summary.md"
