[baseline]
dataset = "reports/cross_modal/ds006848/ds006848_phase2_cohort_swap_windows.npz"
metadata = "reports/cross_modal/ds006848/ds006848_phase2_cohort_swap_windows_metadata.json"
targets = "reports/cross_modal/ds006848/ds006848_cohort_swap_target_arrays.npz"
reference_low_rank_metrics = "reports/cross_modal/ds006848/ds006848_cohort_swap_calibrated_low_rank_amplitude_metrics.json"
source_branch = "eeg_clean_windows"
feature_view = "eeg_clean_detail_summary_windows"
target_names = [
  "amplitude_range",
  "rising_edge_slope_max",
  "dominant_beat_amplitude",
]
aggregate_target_names = [
  "amplitude_range",
  "rising_edge_slope_max",
  "dominant_beat_amplitude",
]
min_train_windows_per_target = 950
min_eval_windows_per_target = 950

[feature_view]
haar_levels = 7
detail_statistics = ["rms", "max_abs"]
include_final_approx = true

[model]
ridge_lambda = 1000.0
candidate_ranks = [8, 16, 32, 64, 128, 256, 512]

[calibration]
eval_windows_per_subject = 32
subject_std_floor = 1.0e-6
null_mse_floor = 1.0e-12

[expected]
min_eval_test_windows = 800

[paths]
report = "reports/cross_modal/ds006848/ds006848_cohort_swap_calibrated_detail_summary_amplitude_report.md"
metrics = "reports/cross_modal/ds006848/ds006848_cohort_swap_calibrated_detail_summary_amplitude_metrics.json"
